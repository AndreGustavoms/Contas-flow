# Plano de build explicito para o Nixpacks (Railway).
# Garante a deteccao de Node mesmo que o auto-detect falhe
# ("Nixpacks was unable to generate a build plan").
providers = ["node"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = ["npm ci"]

[phases.build]
cmds = ["npm run build"]

[start]
cmd = "node server/index.mjs"
